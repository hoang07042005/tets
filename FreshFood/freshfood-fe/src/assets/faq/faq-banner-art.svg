<svg width="520" height="520" viewBox="0 0 520 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="g1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(180 150) rotate(90) scale(220)">
      <stop stop-color="white" stop-opacity="0.22"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(360 340) rotate(90) scale(240)">
      <stop stop-color="#2ECC71" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#2ECC71" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="leaf" x1="180" y1="120" x2="420" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.22"/>
      <stop offset="1" stop-color="white" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feColorMatrix in="b" type="matrix"
        values="0 0 0 0 0.18  0 0 0 0 0.80  0 0 0 0 0.44  0 0 0 0.28 0" result="c"/>
      <feMerge>
        <feMergeNode in="c"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="520" height="520" fill="none"/>
  <circle cx="180" cy="150" r="220" fill="url(#g1)"/>
  <circle cx="360" cy="340" r="240" fill="url(#g2)"/>

  <!-- stylized leaves -->
  <g filter="url(#soft)" opacity="0.95">
    <path d="M346 152c-46 18-98 74-110 128-12 54 20 108 70 112 52 4 104-44 126-98 22-54 12-121-86-142Z" fill="url(#leaf)"/>
    <path d="M328 178c-30 22-60 66-68 108" stroke="white" stroke-opacity="0.18" stroke-width="10" stroke-linecap="round"/>
    <path d="M368 198c-26 28-46 64-52 106" stroke="white" stroke-opacity="0.12" stroke-width="8" stroke-linecap="round"/>
    <path d="M306 214c-18 34-26 70-20 106" stroke="white" stroke-opacity="0.10" stroke-width="7" stroke-linecap="round"/>
  </g>

  <!-- grain dots -->
  <g opacity="0.22">
    <circle cx="418" cy="128" r="3.5" fill="white"/>
    <circle cx="452" cy="160" r="2.8" fill="white"/>
    <circle cx="468" cy="206" r="2.2" fill="white"/>
    <circle cx="410" cy="420" r="3.2" fill="white"/>
    <circle cx="454" cy="392" r="2.4" fill="white"/>
    <circle cx="132" cy="420" r="2.8" fill="white"/>
    <circle cx="102" cy="382" r="2.2" fill="white"/>
  </g>
</svg>

